<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wallpaper Loader</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #container { width: 100vw; height: 100vh; position: relative; }
        img, video, iframe {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; border: none;
        }
        #unmute-btn {
            position: fixed; bottom: 16px; right: 16px; z-index: 999;
            background: rgba(0,0,0,0.6); color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 14px; cursor: pointer; font-size: 0.8rem;
            display: none;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <button id="unmute-btn" onclick="userUnmute()">🔊 TAP TO UNMUTE</button>
    <script>
        const params = new URLSearchParams(window.location.search);
        const appid = params.get('appid');
        const defaultUrl = params.get('default');

        // Open without specifying a version — this lets the browser use whatever
        // version the settings app already created, avoiding a spurious upgrade
        // that would wipe or ignore the existing schema.
        const request = indexedDB.open("WallpaperDB");

        request.onsuccess = e => {
            const db = e.target.result;
            if (!appid || !db.objectStoreNames.contains("settings")) {
                tryDefault(); return;
            }
            const getReq = db.transaction("settings", "readonly")
                             .objectStore("settings")
                             .get(appid);
            getReq.onsuccess = () => {
                if (getReq.result) {
                    const { type, content, muted } = getReq.result;
                    render(type, content, muted);
                } else {
                    tryDefault();
                }
            };
            getReq.onerror = tryDefault;
        };

        request.onerror = tryDefault;

        // If the loader somehow triggers an upgrade (first ever open on this origin),
        // create the schema so it matches what the settings app expects.
        request.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains("library"))
                db.createObjectStore("library", { keyPath: "id", autoIncrement: true });
            if (!db.objectStoreNames.contains("settings"))
                db.createObjectStore("settings", { keyPath: "appid" });
        };

        function tryDefault() {
            if (!defaultUrl) return;
            render(detectType(defaultUrl), defaultUrl, true);
        }

        function detectType(url) {
            const clean = url.split('?')[0].toLowerCase();
            if (/\.(mp4|webm|mov|ogg)$/.test(clean)) return 'video';
            if (/\.(html?|php|aspx?)$/.test(clean)) return 'page';
            if (!/\.(jpe?g|png|gif|webp|avif|svg|bmp)$/.test(clean)) return 'page';
            return 'image';
        }

        let activeVideo = null;

        function render(type, content, muted) {
            const container = document.getElementById('container');
            container.innerHTML = '';

            if (type === 'page') {
                if (content.startsWith('data:') || content.startsWith('blob:')) {
                    const frame = document.createElement('iframe');
                    frame.src = content;
                    frame.sandbox = 'allow-scripts allow-same-origin allow-forms';
                    container.appendChild(frame);
                } else {
                    window.location.replace(content);
                }
                return;
            }

            if (type === 'video') {
                const vid = document.createElement('video');
                vid.src = content;
                vid.autoplay = true;
                vid.loop = true;
                vid.playsInline = true;
                // Always start muted so autoplay is allowed by the browser,
                // then unmute immediately if the setting says sound is on.
                vid.muted = true;
                vid.play().then(() => {
                    if (muted === false) {
                        // Try to unmute now that playback has started.
                        // This works if the page was opened by a user gesture
                        // (e.g. clicking a link). If it fails, show the button.
                        vid.muted = false;
                        if (vid.muted) showUnmuteBtn(vid);
                    }
                }).catch(() => {
                    // Autoplay blocked entirely — nothing to do, video won't play.
                });
                activeVideo = vid;
                container.appendChild(vid);
                return;
            }

            const img = document.createElement('img');
            img.src = content;
            container.appendChild(img);
        }

        function showUnmuteBtn(vid) {
            const btn = document.getElementById('unmute-btn');
            btn.style.display = 'block';
            btn._vid = vid;
        }

        function userUnmute() {
            const btn = document.getElementById('unmute-btn');
            if (btn._vid) btn._vid.muted = false;
            btn.style.display = 'none';
        }
    </script>
</body>
</html>
